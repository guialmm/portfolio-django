# Railway config (requer plano pago)
# Para deploy gratuito, use Render com render.yaml
[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate && python manage.py loaddata apps/portfolio/fixtures/initial_data.json || true && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
